services:
  - type: web
    name: notus-backend
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: QR_HMAC_SECRET
        generateValue: true
      - key: INITIAL_TEACHER_CODE
        sync: false
      - key: DEV_AUTH_TOKENS_ENABLED
        value: "false"
      - key: DEV_DATA_SEED_ENABLED
        value: "false"
      - key: SAMPLE_SCHEDULE_SEED_ENABLED
        value: "false"
      - key: SAMPLE_QUIZ_SEED_ENABLED
        value: "false"
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://your-vercel-app.vercel.app
      - key: APP_FRONTEND_BASE_URL
        value: https://your-vercel-app.vercel.app
      - key: JPA_SHOW_SQL
        value: "false"
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_AUTH
        value: "true"
      - key: SMTP_STARTTLS_ENABLE
        value: "true"
      - key: SMTP_STARTTLS_REQUIRED
        value: "true"
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        value: Notus
      - key: BREVO_API_KEY
        sync: false
